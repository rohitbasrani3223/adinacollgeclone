<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adina Admin Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="admin.css">
</head>
<body>
    <div class="admin-dashboard">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2><i class="fas fa-shield-alt"></i> Adina Admin</h2>
            </div>
            <ul class="sidebar-menu">
                <li class="active" data-tab="gallery-tab"><i class="fas fa-images"></i> Manage Gallery</li>
                <li data-tab="popup-tab"><i class="fas fa-bullhorn"></i> Manage Popup</li>
                <li><a href="index.html" class="back-link"><i class="fas fa-external-link-alt"></i> View Website</a></li>
            </ul>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="topbar">
                <h1>Dashboard</h1>
                <div class="user-info">
                    <span>Admin User</span>
                    <i class="fas fa-user-circle"></i>
                </div>
            </header>

            <div class="content-wrapper">
                
                <!-- Gallery Management Tab -->
                <section id="gallery-tab" class="tab-content active">
                    <div class="section-header">
                        <h2>Life @ Adina Gallery</h2>
                        <button class="btn btn-primary" id="addImgBtn"><i class="fas fa-plus"></i> Add New Image</button>
                    </div>
                    
                    <div class="card">
                        <div class="table-responsive">
                            <table class="admin-table">
                                <thead>
                                    <tr>
                                        <th>Image Preview</th>
                                        <th>Image URL</th>
                                        <th>Caption</th>
                                        <th>Actions</th>
                                    </tr>
                                </thead>
                                <tbody id="galleryTableBody">
                                    <!-- Dynamic rows -->
                                </tbody>
                            </table>
                        </div>
                    </div>
                </section>

                <!-- Popup Management Tab -->
                <section id="popup-tab" class="tab-content">
                    <div class="section-header">
                        <h2>Announcement Popup</h2>
                    </div>

                    <div class="card form-card">
                        <form id="popupForm">
                            <div class="form-group toggle-group">
                                <label for="popupEnabled">Enable Popup</label>
                                <label class="switch">
                                    <input type="checkbox" id="popupEnabled">
                                    <span class="slider round"></span>
                                </label>
                            </div>

                            <div class="form-group">
                                <label for="popupTitle">Popup Title</label>
                                <input type="text" id="popupTitle" class="form-control" placeholder="Enter popup title">
                            </div>

                            <div class="form-group">
                                <label for="popupBody">Popup Content (HTML allowed)</label>
                                <textarea id="popupBody" class="form-control" rows="5" placeholder="Enter popup content..."></textarea>
                            </div>

                            <button type="submit" class="btn btn-success"><i class="fas fa-save"></i> Save Popup Settings</button>
                        </form>
                    </div>
                </section>

            </div>
        </main>
    </div>

    <!-- Add Image Modal -->
    <div id="imageModal" class="admin-modal">
        <div class="admin-modal-content">
            <span class="close-admin-modal">&times;</span>
            <h3 id="modalTitle">Add Gallery Image</h3>
            <form id="imageForm">
                <input type="hidden" id="editIndex" value="-1">
                <div class="form-group">
                    <label>Image Source</label>
                    <div id="dropZone" class="drop-zone">
                        <i class="fas fa-cloud-upload-alt fa-3x mb-2" style="color:var(--secondary); margin-bottom:10px;"></i>
                        <p>Drag & Drop image here from your laptop<br>or click to browse</p>
                        <input type="file" id="fileInput" accept="image/*" hidden>
                    </div>
                    <div style="text-align:center; margin:10px 0; font-weight:bold;">OR</div>
                    <label for="imgUrl">Enter Image URL / Path manually</label>
                    <input type="text" id="imgUrl" class="form-control" placeholder="e.g., ./images/my-image.jpg" required>
                </div>
                <div class="form-group">
                    <label for="imgCaption">Caption</label>
                    <input type="text" id="imgCaption" class="form-control" placeholder="Image description" required>
                </div>
                <button type="submit" class="btn btn-primary">Save Image</button>
            </form>
        </div>
    </div>

    <script src="admin.js"></script>
</body>
</html>
